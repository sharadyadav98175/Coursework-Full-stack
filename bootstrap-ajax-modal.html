<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ajax + Bootstrap Modal (Improved)</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      /* Simple table styling */
      #ajaxContent td {
        padding: 6px;
        border-bottom: 1px solid #ddd;
      }
    </style>
  </head>

  <body>
    <div class="container mt-4">
      <h1>Ajax + Bootstrap Modal Demo</h1>

      <!-- Button trigger modal -->
      <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
        Load Books
      </button>

      <!-- Modal -->
      <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalLabel">Available Books</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <table id="ajaxContent" class="table table-striped"></table>
              <div id="errorMessage" class="text-danger mt-2"></div>
            </div>

            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>

          </div>
        </div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const modal = document.getElementById('exampleModal');

      modal.addEventListener('show.bs.modal', () => {

        const table = document.getElementById("ajaxContent");
        const errorMsg = document.getElementById("errorMessage");

        // Clear text + show spinner
        table.innerHTML = `
          <tr>
            <td>
              <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
            </td>
          </tr>
        `;
        errorMsg.textContent = "";

        // Fetch the data
        fetch('https://mi-linux.wlv.ac.uk/~2413835/ajax/ajax.php')

          .then(response => response.json())
          .then(data => {
            table.innerHTML = "";

            // If no results
            if (data.length === 0) {
              table.innerHTML = "<tr><td><em>No books found.</em></td></tr>";
              return;
            }

            // Add rows
            data.forEach(book => {
              let row = table.insertRow();
              let cell = row.insertCell();
              cell.textContent = book.book_name;
            });
          })

          // If Ajax fails → show error message
          .catch(() => {
            table.innerHTML = "";
            errorMsg.textContent = "Error loading data. Please try again.";
          });
      });
    </script>

  </body>
</html>
